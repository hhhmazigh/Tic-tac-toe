services:
  - type: web
    name: mazigh-tictactoe
    runtime: node
    plan: free
    buildCommand: >
      pnpm install --frozen-lockfile &&
      pnpm --filter @workspace/db run push &&
      PORT=3000 BASE_PATH=/ pnpm --filter @workspace/tictactoe run build &&
      pnpm --filter @workspace/api-server run build
    startCommand: node artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: mazigh-tictactoe-db
          property: connectionString

databases:
  - name: mazigh-tictactoe-db
    plan: free
